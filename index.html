<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Brasil x Haiti — Copa do Mundo 2026</title>
<style>
  :root{
    --verde:#009c3b;
    --amarelo:#ffdf00;
    --azul:#002776;
    --haiti:#d21034;
    --bg:#f4f6f5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:#1a1a1a;
  }
  header{
    background:linear-gradient(135deg,var(--verde) 0%,var(--verde) 55%,var(--amarelo) 100%);
    color:#fff;
    padding:28px 16px 22px;
    text-align:center;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  header h1{
    margin:0 0 4px;
    font-size:1.5rem;
  }
  header p{
    margin:2px 0;
    font-size:.95rem;
    opacity:.95;
  }
  .stripe{
    height:4px;
    background:repeating-linear-gradient(90deg,var(--verde) 0 20px, var(--amarelo) 20px 40px, var(--haiti) 40px 60px, var(--azul) 60px 80px);
  }
  main{
    max-width:560px;
    margin:0 auto;
    padding:20px 16px 60px;
  }
  .card{
    background:#fff;
    border-radius:14px;
    padding:20px;
    margin-bottom:22px;
    box-shadow:0 2px 12px rgba(0,0,0,.08);
  }
  .card h2{
    margin:0 0 14px;
    font-size:1.1rem;
    color:var(--azul);
  }
  label{
    display:block;
    font-size:.85rem;
    font-weight:600;
    margin-bottom:6px;
    color:#444;
  }
  input[type=text], input[type=number], input[type=password]{
    width:100%;
    padding:11px 12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:1rem;
    margin-bottom:14px;
  }
  .placar-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:6px;
  }
  .placar-row .time{
    flex:1;
    font-weight:700;
    font-size:.95rem;
  }
  .placar-row input{
    width:70px;
    text-align:center;
    margin-bottom:0;
  }
  .versus{
    text-align:center;
    color:#888;
    font-weight:700;
  }
  button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:8px;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    color:#fff;
    background:var(--verde);
    transition:opacity .15s;
  }
  button:hover{opacity:.9;}
  button.secundario{
    background:#25D366;
    margin-top:10px;
  }
  button.admin{
    background:#888;
    font-size:.8rem;
    padding:8px;
  }
  #msg{
    margin-top:10px;
    font-size:.9rem;
    text-align:center;
    min-height:18px;
  }
  #msg.ok{color:var(--verde);font-weight:600;}
  #msg.erro{color:var(--haiti);font-weight:600;}
  table{
    width:100%;
    border-collapse:collapse;
    font-size:.9rem;
  }
  th,td{
    padding:8px 6px;
    text-align:left;
    border-bottom:1px solid #eee;
  }
  th{color:#666;font-size:.78rem;text-transform:uppercase;}
  tr.vencedor{background:#e6f7ec;}
  tr.vencedor td:first-child::after{content:" 🏆";}
  #resultadoOficial{
    text-align:center;
    font-weight:700;
    color:var(--azul);
    margin-bottom:10px;
    display:none;
  }
  details{margin-top:10px;}
  summary{cursor:pointer;color:#888;font-size:.8rem;}
  .vazio{color:#999;font-size:.9rem;text-align:center;padding:10px 0;}
  footer{
    text-align:center;
    color:#999;
    font-size:.78rem;
    padding:10px 16px 30px;
  }
</style>
</head>
<body>

<header>
  <h1>🏆 Bolão Brasil x Haiti</h1>
  <p>Copa do Mundo 2026 — Grupo C</p>
  <p>Sexta-feira, 19/06 • 21h30 (horário de Brasília) • Estádio da Filadélfia</p>
</header>
<div class="stripe"></div>

<main>

  <div class="card">
    <h2>Faça seu palpite</h2>
    <form id="form-palpite">
      <label for="nome">Seu nome</label>
      <input type="text" id="nome" maxlength="40" placeholder="Ex: Duilio" required>

      <label>Placar final</label>
      <div class="placar-row">
        <span class="time">🇧🇷 Brasil</span>
        <input type="number" id="placarBrasil" min="0" max="20" required>
        <span class="versus">x</span>
        <input type="number" id="placarHaiti" min="0" max="20" required>
        <span class="time" style="text-align:right">Haiti 🇭🇹</span>
      </div>

      <button type="submit">Enviar palpite</button>
      <div id="msg"></div>
    </form>
  </div>

  <div class="card">
    <h2>Palpites <span id="contador" style="color:#999;font-weight:400;font-size:.85rem;"></span></h2>
    <div id="resultadoOficial"></div>
    <div id="lista">
      <p class="vazio">Carregando...</p>
    </div>
    <button class="secundario" id="btnWhatsapp">📲 Compartilhar lista no WhatsApp</button>

    <details>
      <summary>Definir resultado oficial (admin)</summary>
      <div style="margin-top:10px;">
        <div class="placar-row">
          <span class="time">🇧🇷 Brasil</span>
          <input type="number" id="oficialBrasil" min="0" max="20">
          <span class="versus">x</span>
          <input type="number" id="oficialHaiti" min="0" max="20">
          <span class="time" style="text-align:right">Haiti 🇭🇹</span>
        </div>
        <button class="admin" id="btnOficial">Salvar resultado oficial</button>
      </div>
    </details>
  </div>

</main>

<footer>Feito para a galera • dados salvos no Firebase</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
  // ====== CONFIGURAÇÃO DO FIREBASE ======
  // Cole aqui as chaves do seu projeto (Firebase Console > Configurações do projeto > Seus apps > SDK setup).
  const firebaseConfig = {
    apiKey: "AIzaSyCldIga8UzI_f6OfVTL_zUYlZjqKQUFbeE",
    authDomain: "bolao-brasil-haiti-ddf6f.firebaseapp.com",
    projectId: "bolao-brasil-haiti-ddf6f",
    storageBucket: "bolao-brasil-haiti-ddf6f.firebasestorage.app",
    messagingSenderId: "776481320456",
    appId: "1:776481320456:web:a737de47c1f9618aa8ebbd"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function slug(str){
    return str
      .normalize('NFD').replace(/[̀-ͯ]/g,'')
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9]+/g,'-')
      .replace(/^-+|-+$/g,'');
  }

  // ---- Envio de palpite ----
  const form = document.getElementById('form-palpite');
  const msg = document.getElementById('msg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const brasil = parseInt(document.getElementById('placarBrasil').value, 10);
    const haiti = parseInt(document.getElementById('placarHaiti').value, 10);

    if(!nome || isNaN(brasil) || isNaN(haiti) || brasil < 0 || haiti < 0){
      msg.textContent = 'Preencha nome e placar corretamente.';
      msg.className = 'erro';
      return;
    }

    const id = slug(nome);
    if(!id){
      msg.textContent = 'Nome inválido.';
      msg.className = 'erro';
      return;
    }

    try{
      await db.collection('palpites').doc(id).set({
        nome: nome,
        brasil: brasil,
        haiti: haiti,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
      msg.textContent = '✅ Palpite registrado! Pode atualizar enviando de novo com o mesmo nome.';
      msg.className = 'ok';
    }catch(err){
      console.error(err);
      msg.textContent = 'Erro ao enviar. Tente novamente.';
      msg.className = 'erro';
    }
  });

  // ---- Lista em tempo real ----
  let palpitesAtuais = [];
  let oficial = null;

  function renderLista(){
    const lista = document.getElementById('lista');
    const contador = document.getElementById('contador');
    contador.textContent = palpitesAtuais.length ? `(${palpitesAtuais.length})` : '';

    if(palpitesAtuais.length === 0){
      lista.innerHTML = '<p class="vazio">Nenhum palpite ainda. Seja o primeiro!</p>';
      return;
    }

    let html = '<table><thead><tr><th>Nome</th><th>Placar</th></tr></thead><tbody>';
    palpitesAtuais.forEach(p => {
      const acertou = oficial && p.brasil === oficial.brasil && p.haiti === oficial.haiti;
      html += `<tr class="${acertou ? 'vencedor' : ''}"><td>${escapeHtml(p.nome)}</td><td>${p.brasil} x ${p.haiti}</td></tr>`;
    });
    html += '</tbody></table>';
    lista.innerHTML = html;
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderOficial(){
    const el = document.getElementById('resultadoOficial');
    if(oficial){
      el.style.display = 'block';
      el.textContent = `Resultado oficial: Brasil ${oficial.brasil} x ${oficial.haiti} Haiti`;
    }else{
      el.style.display = 'none';
    }
  }

  db.collection('palpites').orderBy('timestamp', 'asc').onSnapshot(snap => {
    palpitesAtuais = snap.docs.map(d => d.data());
    renderLista();
  }, err => {
    document.getElementById('lista').innerHTML = '<p class="vazio">Erro ao carregar palpites.</p>';
    console.error(err);
  });

  db.collection('config').doc('resultado').onSnapshot(snap => {
    oficial = snap.exists ? snap.data() : null;
    renderOficial();
    renderLista();
  });

  // ---- Resultado oficial (admin simples) ----
  document.getElementById('btnOficial').addEventListener('click', async () => {
    const senha = prompt('Senha de admin:');
    if(senha !== 'brasil2026'){ // troque por uma senha sua antes de publicar
      alert('Senha incorreta.');
      return;
    }
    const b = parseInt(document.getElementById('oficialBrasil').value, 10);
    const h = parseInt(document.getElementById('oficialHaiti').value, 10);
    if(isNaN(b) || isNaN(h)){ alert('Preencha o placar oficial.'); return; }
    await db.collection('config').doc('resultado').set({ brasil: b, haiti: h });
    alert('Resultado oficial salvo!');
  });

  // ---- Compartilhar no WhatsApp ----
  document.getElementById('btnWhatsapp').addEventListener('click', () => {
    let texto = '🏆 *Bolão Brasil x Haiti* — Copa do Mundo 2026\n\n';
    if(oficial){
      texto += `📌 Resultado oficial: Brasil ${oficial.brasil} x ${oficial.haiti} Haiti\n\n`;
    }
    if(palpitesAtuais.length === 0){
      texto += 'Nenhum palpite ainda.';
    }else{
      palpitesAtuais.forEach(p => {
        const acertou = oficial && p.brasil === oficial.brasil && p.haiti === oficial.haiti;
        texto += `${acertou ? '🏆 ' : '• '}${p.nome}: ${p.brasil} x ${p.haiti}\n`;
      });
    }
    const url = 'https://wa.me/?text=' + encodeURIComponent(texto);
    window.open(url, '_blank');
  });
</script>
</body>
</html>
